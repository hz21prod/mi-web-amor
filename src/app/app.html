<div class="hero">
  <h1 class="hero-title">Título principal</h1>
  <p class="hero-subtitle">Subtítulo</p>
  <div class="scroll-hint">↓</div>
</div>

<section class="story-section" *ngFor="let section of sections">
  <div class="story-content">
    <span class="story-icon"><fa-icon [icon]="section.icon"></fa-icon></span>
    <h2 class="story-heading">{{ section.heading }}</h2>
    <p class="story-text">{{ section.text }}</p>
  </div>
</section>
